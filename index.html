<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>💩 Latrine</title>
    <meta name="theme-color" content="#2c5d44" />
    <meta name="description" content="Latrine — a shedding card game. Last player holding cards is the Poop Head." />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <!-- iOS standalone home-screen launch. status-bar-style "black-translucent"
         lets the felt background bleed under the system status bar so the
         game looks fullscreen on installed iPhones. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Latrine" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icon.svg" />

    <!-- First-paint splash. The JS bundle is ~670KB so on a cold cache
         there's ~400ms of "blank white screen" before React mounts.
         Inline CSS paints the felt + wordmark immediately so the user
         sees something on-brand from frame 0. App's <div id="root">
         renders on top and the splash sits behind it — when React
         mounts, the splash is naturally covered. The wordmark fades
         out via opacity-driven CSS to avoid a hard "pop" when the
         actual UI lands. -->
    <style>
      :root {
        background: radial-gradient(ellipse 100% 100% at 50% 50%, #4f8a6c 0%, #2c5d44 50%, #1c4030 100%);
      }
      html, body { background: #2c5d44; }
      .ph-splash {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: radial-gradient(ellipse 100% 100% at 50% 50%, #4f8a6c 0%, #2c5d44 50%, #1c4030 100%);
        color: #fff;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        z-index: 0;
        pointer-events: none;
      }
      .ph-splash .wm {
        font-size: clamp(2rem, 6vw, 3.75rem);
        font-weight: 900;
        letter-spacing: 0.22em;
        text-shadow: 0 4px 24px rgba(16,185,129,0.35);
        opacity: 0;
        animation: ph-fade-in 0.45s ease-out 0.05s forwards, ph-fade-out 0.4s ease-in 1.6s forwards;
      }
      @keyframes ph-fade-in  { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
      @keyframes ph-fade-out { to   { opacity: 0; } }
      /* Once the SPA mounts, #root has content and pushes the splash out of
         the layout flow via z-index. JS does the heavy lift — this just
         ensures we never see white. */
    </style>

    <!-- Google Analytics (gtag.js, GA4). Loaded async so it doesn't block
         render. The SPA never changes URL (everything is on "/"), so the
         default page_view only fires once on load — App.tsx fires manual
         page_view events on mode change to track menu → game → profile etc. -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-P7E2QM68KJ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-P7E2QM68KJ', { send_page_view: false });
    </script>
  </head>
  <body>
    <div class="ph-splash" aria-hidden="true"><div class="wm">LATRINE</div></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
