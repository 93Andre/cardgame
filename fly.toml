# Fly.io config for the Poop Head WebSocket server.
# Rename `app` to something unique to your Fly account before first deploy
# (or run `fly launch` and let the wizard pick one).

app = "poophead-server"
primary_region = "iad"

[build]
  # Builds from ./Dockerfile

[http_service]
  internal_port = 8080
  force_https = true
  # Persistent connections — keep the machine awake.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
